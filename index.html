<!DOCTYPE html>
<html>
<head>

<title>Nifty Options Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding-top:40px;
}

.card{
background:#222;
padding:20px;
margin:15px;
border-radius:10px;
font-size:22px;
}

.value{
font-size:30px;
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Nifty Options Dashboard</h1>

<div class="card">
Nifty Price
<div id="price" class="value">Loading...</div>
</div>

<div class="card">
Suggested Support
<div id="support" class="value">Calculating...</div>
</div>

<div class="card">
Suggested Resistance
<div id="resistance" class="value">Calculating...</div>
</div>

<div class="card">
Market Bias
<div id="signal" class="value">Analyzing...</div>
</div>

<script>

async function loadData(){

try{

let response = await fetch("https://api.coindesk.com/v1/bpi/currentprice.json");

let data = await response.json();

let price = Math.floor(data.bpi.USD.rate_float);

document.getElementById("price").innerText = price;

let support = Math.floor(price/50)*50;
let resistance = support + 100;

document.getElementById("support").innerText = support;
document.getElementById("resistance").innerText = resistance;

if(price > support + 30){
document.getElementById("signal").innerText = "Bullish";
}else{
document.getElementById("signal").innerText = "Bearish";
}

}catch(e){

document.getElementById("signal").innerText="Data Error";

}

}

loadData();

setInterval(loadData,30000);

</script>

</body>

</html>
